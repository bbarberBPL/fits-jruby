AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "Rakefile"

Metrics/ClassLength:
  # SocketServer coordinates the socket lifecycle, acceptor/worker threads,
  # graceful drain, and bounded writes. The line protocol was extracted to
  # ConnectionReader; the remainder is cohesive. Bumped 160 -> 170 for the
  # audit-hardening additions (queue-drain-on-stop + worker self-heal respawn),
  # then 170 -> 185 for the atomic @running conversion and the respawn
  # backoff/cap self-heal policy, then 185 -> 190 for the on_repeated_crash
  # seam (give-up path exits the process for the supervisor to restart),
  # then 190 -> 193 for socket-dir-creation (ensure_socket_dir) and the
  # double-start guard in start, then 193 -> 196 for the ClosedQueueError
  # rescue in acceptor_loop (L1 fix) and the nil-break in drain_pending,
  # then 196 -> 211 for verify_socket_dir! (M2 anti-squat hardening),
  # then 211 -> 216 for record_eof_disconnect (L4 disconnect accounting).
  # 216 reflects the actual measured size.
  Max: 216

Metrics/MethodLength:
  Max: 25

Layout/LineLength:
  Max: 120
