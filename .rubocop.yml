AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "Rakefile"

Metrics/ClassLength:
  # SocketServer coordinates the socket lifecycle, acceptor/worker threads,
  # graceful drain, and bounded writes. The line protocol was extracted to
  # ConnectionReader; the remainder is cohesive. 160 reflects the actual size.
  Max: 160

Metrics/MethodLength:
  Max: 25

Layout/LineLength:
  Max: 120
