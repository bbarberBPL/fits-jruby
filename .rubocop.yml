AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "Rakefile"

Metrics/ClassLength:
  # SocketServer coordinates the socket lifecycle, acceptor/worker threads,
  # graceful drain, and bounded writes. The line protocol was extracted to
  # ConnectionReader; the remainder is cohesive. Bumped 160 -> 170 for the
  # audit-hardening additions (queue-drain-on-stop + worker self-heal respawn).
  # 170 reflects the actual measured size.
  Max: 170

Metrics/MethodLength:
  Max: 25

Layout/LineLength:
  Max: 120
